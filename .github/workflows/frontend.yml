name: Frontend CI/CD

on:
  push:
    paths:
      - "frontend/**"
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint (optional)
        run: npm run lint || echo "No lint configured"

      - name: Run tests (optional)
        run: npm test || echo "No tests configured"

      - name: Build project
        run: npm run build

      