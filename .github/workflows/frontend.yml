name: Frontend CI/CD

on:
  push:
    paths:
      - "frontend/**"
    branches: [main]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: ls -R

      - name: Install
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build